<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 看盘</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
:root{
  --bg:#131722;--bg2:#1e222d;--bg3:#2a2e39;--border:#363c4e;
  --text:#d1d4dc;--text2:#787b86;
  --green:#26a69a;--red:#ef5350;--blue:#2962ff;
  --yellow:#f9a825;--orange:#ff9800;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Trebuchet MS',-apple-system,BlinkMacSystemFont,sans-serif;font-size:12px;display:flex;flex-direction:column}

/* ── HEADER ── */
#hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 14px;display:flex;align-items:center;gap:14px;height:46px;flex-shrink:0}
#logo{font-size:14px;font-weight:700;color:#fff;white-space:nowrap}
#lp{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-.5px}
#lp.up{color:var(--green)}#lp.dn{color:var(--red)}
#pc{font-size:11px;font-weight:600;padding:2px 7px;border-radius:3px}
#pc.up{background:rgba(38,166,154,.18);color:var(--green)}#pc.dn{background:rgba(239,83,80,.18);color:var(--red)}
.hst{display:flex;flex-direction:column}
.hst-l{color:var(--text2);font-size:9px;text-transform:uppercase;letter-spacing:.4px}
.hst-v{font-size:11px;font-weight:600;font-variant-numeric:tabular-nums}
#dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 5px var(--green);animation:pulse 2s infinite;margin-left:auto;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ── GLOBAL INDICATOR BAR ── */
#ind-bar{
  background:var(--bg2);border-bottom:1px solid var(--border);
  padding:0 10px;height:30px;flex-shrink:0;
  display:flex;align-items:center;gap:6px;overflow:hidden;
}
.ma-grp{display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;flex-shrink:0}
.ma-btn{padding:0 9px;height:20px;background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:11px;font-weight:700;transition:all .12s;letter-spacing:.2px}
.ma-btn:hover{background:rgba(255,255,255,.06);color:var(--text)}
.ma-btn.on{background:var(--blue);color:#fff}
.isep{width:1px;height:18px;background:var(--border);flex-shrink:0}
#sh-chips{display:flex;gap:3px;flex:1;align-items:center;overflow:hidden;min-width:0}
.chip{display:flex;align-items:center;border-radius:2px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border:1px solid transparent;line-height:1;transition:opacity .15s}
.chip.hidden-ind{opacity:.35}
.chip:hover{filter:brightness(1.3)}
.chip .cl{padding:1px 4px}
.chip .eye{padding:1px 3px;opacity:.5;cursor:pointer;font-size:9px;transition:opacity .1s;user-select:none}
.chip .eye:hover{opacity:1}
.chip .cx{padding:1px 3px 1px 0;opacity:.4;cursor:pointer;font-size:9px}
.chip .cx:hover{opacity:1;color:var(--red)}
.add-ind{background:none;border:1px solid var(--border);color:var(--text2);border-radius:2px;cursor:pointer;font-size:13px;padding:0 6px;height:20px;display:flex;align-items:center;flex-shrink:0}
.add-ind:hover{border-color:var(--blue);color:var(--blue)}
.row-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:2px;cursor:pointer;font-size:10px;font-weight:700;padding:0 6px;height:20px;flex-shrink:0}
.row-btn:hover{border-color:var(--blue);color:var(--blue)}

/* ── BODY ROW: left column | chart scroll area ── */
#body-row{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0}

/* left vertical column: chat (top) + minimap (bottom) */
#left-col{width:220px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);position:relative;background:var(--bg2)}
#left-handle{position:absolute;top:0;right:-3px;width:6px;height:100%;cursor:col-resize;z-index:20}
#left-handle:hover{background:var(--blue)}

/* chat */
#chat-bar{flex:1;display:flex;flex-direction:column;min-height:0}
#chat-hd{font-size:10px;font-weight:700;color:var(--text2);padding:5px 10px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;align-items:center;gap:6px}
#chat-msgs{flex:1;overflow-y:auto;padding:4px 10px;display:flex;flex-direction:column;gap:3px}
#chat-msgs::-webkit-scrollbar{width:4px}
#chat-msgs::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:2px}
.cm{display:flex;flex-direction:column;font-size:11px;line-height:1.35}
.cm-top{display:flex;align-items:baseline;gap:6px}
.cn{color:var(--blue);font-weight:700;flex-shrink:0}
.ct{color:var(--text2);font-size:9px;flex-shrink:0}
.cb{color:var(--text);word-break:break-word}
#chat-input-row{display:flex;flex-direction:column;gap:4px;padding:6px 8px;border-top:1px solid var(--border);flex-shrink:0}
#chat-inp{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:3px;padding:4px 8px;font-size:11px;outline:none}
#chat-inp:focus{border-color:var(--blue)}
#chat-send{background:var(--blue);border:none;color:#fff;border-radius:3px;padding:4px 10px;font-size:11px;cursor:pointer}
#chat-send:hover{background:#1e53e5}
#chat-status{font-size:9px;color:var(--text2)}

/* minimap navigator */
#minimap{height:170px;flex-shrink:0;border-top:1px solid var(--border);position:relative;overflow:hidden;background:var(--bg);cursor:pointer}
#mm-title{position:absolute;top:2px;left:0;right:0;text-align:center;font-size:9px;color:var(--text2);z-index:3;pointer-events:none}
#mm-track{position:absolute;inset:0}
.mm-blk{position:absolute;background:var(--bg3);border:1px solid var(--border);border-radius:2px;font-size:9px;font-weight:700;color:var(--text2);display:flex;align-items:center;justify-content:center;overflow:hidden}
#mm-thumb{position:absolute;left:0;right:0;background:rgba(41,98,255,.18);border:1px solid var(--blue);border-radius:2px;z-index:2;pointer-events:none}

/* ── SCROLLABLE GRID AREA ── */
:root{--row-h:420px}
#scroll-wrap{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0}
#scroll-wrap::-webkit-scrollbar{width:5px}
#scroll-wrap::-webkit-scrollbar-track{background:var(--bg)}
#scroll-wrap::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
#grid{display:grid;grid-template-columns:1fr 1fr;grid-auto-rows:var(--row-h);gap:1px;background:var(--border)}
.pnl{background:var(--bg);display:flex;flex-direction:column;overflow:hidden;height:var(--row-h)}
#grid.row-resizing{cursor:row-resize;user-select:none}

/* ── PANEL TOOLBAR ── */
.ptb{display:flex;align-items:center;gap:4px;padding:0 6px;background:var(--bg2);border-bottom:1px solid var(--border);height:26px;flex-shrink:0}
.tf-sel{background:transparent;border:none;color:var(--text);font-size:12px;font-weight:700;cursor:pointer;outline:none;-webkit-appearance:none;flex-shrink:0}
.tf-sel option{background:var(--bg3)}
.vm-btn{background:none;border:1px solid var(--border);color:var(--text2);border-radius:2px;cursor:pointer;font-size:9px;font-weight:700;padding:0 4px;height:16px;line-height:16px;flex-shrink:0;transition:all .12s}
.vm-btn:hover{border-color:#888;color:var(--text)}
.vm-btn.on{background:rgba(41,98,255,.25);border-color:var(--blue);color:var(--blue)}
.pp{margin-left:auto;font-size:10px;font-variant-numeric:tabular-nums;color:var(--text2);white-space:nowrap;flex-shrink:0}

/* ── CHART WRAPPER ── */
.cw{flex:1;position:relative;overflow:hidden}
.ldg{position:absolute;inset:0;background:rgba(19,23,34,.9);display:flex;align-items:center;justify-content:center;z-index:30;color:var(--text2);font-size:11px;gap:8px}
.sp{width:13px;height:13px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── GLOBAL POPOVER ── */
#gpop{position:fixed;z-index:1000;background:#1e222d;border:1px solid #363c4e;border-radius:6px;padding:12px 14px;min-width:215px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;flex-direction:column;gap:9px}
#gpop.show{display:flex}
#gpop h4{font-size:12px;font-weight:700;color:var(--text)}
.grow{display:flex;align-items:center;gap:8px}
.gl{color:var(--text2);font-size:11px;width:52px;flex-shrink:0}
.gsel,.ginp{background:#2a2e39;border:1px solid #363c4e;color:var(--text);border-radius:3px;padding:3px 7px;font-size:12px;outline:none;flex:1}
.gsel:focus,.ginp:focus{border-color:var(--blue)}
.ginp{width:80px;flex:none}
.gbtn{padding:5px 14px;background:var(--blue);border:none;color:#fff;border-radius:3px;cursor:pointer;font-size:12px;font-weight:600}
.gbtn:hover{background:#1e53e5}
.gcl{position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:0}
.gcl:hover{color:var(--text)}
.vrow{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text2)}
.vrow input[type=range]{flex:1;accent-color:var(--blue)}
.vrow .vv{color:var(--text);font-weight:600;width:28px;text-align:right}
.tf-chip{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:3px;background:var(--bg3);border:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text);flex-shrink:0}
.tf-chip.builtin{color:var(--text2)}
.tf-chip .tcx{cursor:pointer;opacity:.4;font-size:9px;margin-left:1px}
.tf-chip .tcx:hover{opacity:1;color:var(--red)}

/* ── PRESET / RESTORE MODAL ── */
#preset-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:2000;display:none;align-items:center;justify-content:center}
#preset-modal.show{display:flex}
.pm-box{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:22px 24px;min-width:340px;max-width:90vw;box-shadow:0 12px 48px rgba(0,0,0,.8);display:flex;flex-direction:column;gap:12px}
.pm-box h3{font-size:15px;font-weight:700;color:#fff}
.pm-box .pm-sub{font-size:11px;color:var(--text2);line-height:1.5}
.pm-sec{font-size:11px;color:var(--text2);font-weight:700;margin-top:4px}
.pm-btn{text-align:left;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:9px 12px;font-size:12px;cursor:pointer;transition:all .12s}
.pm-btn:hover{border-color:var(--blue);background:rgba(41,98,255,.12)}
.pm-btn b{color:#fff;font-size:13px}
.pm-btn .pm-d{display:block;font-size:10px;color:var(--text2);margin-top:2px}
.pm-btn.restore{border-color:var(--green)}
.pm-btn.restore b{color:var(--green)}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<div id="hdr">
  <div id="logo">₿ BTC/USDT</div>
  <span id="lp">--</span><span id="pc">--</span>
  <div class="hst"><span class="hst-l">24H 高</span><span class="hst-v" id="shi" style="color:var(--green)">--</span></div>
  <div class="hst"><span class="hst-l">24H 低</span><span class="hst-v" id="slo" style="color:var(--red)">--</span></div>
  <div class="hst"><span class="hst-l">24H 量</span><span class="hst-v" id="svol">--</span></div>
  <div class="hst"><span class="hst-l">资金费率</span><span class="hst-v" id="sfr">--</span></div>
  <div class="hst"><span class="hst-l">未平仓</span><span class="hst-v" id="soi">--</span></div>
  <div id="dot"></div>
</div>

<!-- ── GLOBAL INDICATOR BAR ── -->
<div id="ind-bar">
  <div class="ma-grp">
    <button class="ma-btn on" data-t="tema" onclick="toggleMA('tema')">TEMA</button>
    <button class="ma-btn"   data-t="ma"   onclick="toggleMA('ma')">MA</button>
  </div>
  <div class="isep"></div>
  <div id="sh-chips"></div>
  <button class="add-ind" id="global-add-btn" onclick="openPopAdd(this)">+</button>
  <div class="isep"></div>
  <button class="add-ind" id="tf-mgr-btn" onclick="openTFMgr(this)" title="管理时间周期">⏱+</button>
  <div class="isep"></div>
  <button class="row-btn" onclick="addRow()" title="增加一行">+行</button>
  <button class="row-btn" onclick="removeRow()" title="减少一行">-行</button>
  <button class="row-btn" onclick="openPresetModal(loadSavedSettings())" title="界面预设">界面</button>
</div>

<!-- ── TF MANAGER POPOVER ── -->
<div id="tfpop" style="position:fixed;z-index:1001;background:#1e222d;border:1px solid #363c4e;border-radius:6px;padding:12px 14px;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.7);display:none;flex-direction:column;gap:9px">
  <button style="position:absolute;top:8px;right:10px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:14px" onclick="closeTFMgr()">✕</button>
  <h4 style="font-size:12px;font-weight:700;color:var(--text)">管理时间周期</h4>
  <div id="tf-chips" style="display:flex;flex-wrap:wrap;gap:4px;max-height:110px;overflow-y:auto"></div>
  <div style="display:flex;gap:6px;align-items:center;border-top:1px solid var(--border);padding-top:8px">
    <span style="color:var(--text2);font-size:11px;flex-shrink:0">新增：</span>
    <input id="tf-custom-inp" class="ginp" placeholder="如 2m, 8h, 1M" style="flex:1" onkeydown="if(event.key==='Enter')addCustomTF()">
    <button class="gbtn" style="padding:4px 10px" onclick="addCustomTF()">添加</button>
  </div>
  <div id="tf-err" style="color:var(--red);font-size:10px;display:none"></div>
</div>

<!-- ── BODY ROW ── -->
<div id="body-row">
  <!-- LEFT COLUMN: chat + minimap -->
  <div id="left-col">
    <div id="chat-bar">
      <div id="chat-hd">💬 公共聊天 · <span id="chat-nick-lbl">--</span><span id="chat-status" style="margin-left:auto">○</span></div>
      <div id="chat-msgs"></div>
      <div id="chat-input-row">
        <input id="chat-inp" placeholder="发送消息…" onkeydown="if(event.key==='Enter')sendChat()">
        <button id="chat-send" onclick="sendChat()">发送</button>
      </div>
    </div>
    <div id="minimap" title="拖动/滚轮浏览全部周期">
      <div id="mm-title">缩略导航</div>
      <div id="mm-track"></div>
      <div id="mm-thumb"></div>
    </div>
    <div id="left-handle"></div>
  </div>

  <!-- RIGHT: scrollable charts -->
  <div id="scroll-wrap">
    <div id="grid"></div>
  </div>
</div>

<!-- ── GLOBAL POPOVER ── -->
<div id="gpop">
  <button class="gcl" onclick="closePop()">✕</button>
  <h4 id="gpop-title">添加指标</h4>
  <div class="grow">
    <span class="gl">类型</span>
    <select class="gsel" id="g-type" onchange="onGTypeChange()">
      <option value="ma-line">均线 TEMA/MA</option>
      <option value="bb">布林带 BB</option>
      <option value="vwap">VWAP</option>
      <option value="vpvr">VPVR（成交量分布）</option>
    </select>
  </div>
  <div id="g-period-row" class="grow">
    <span class="gl">周期</span>
    <input class="ginp" id="g-period" type="number" min="1" max="2000" value="21">
  </div>
  <div id="g-mult-row" class="grow" style="display:none">
    <span class="gl">倍数</span>
    <input class="ginp" id="g-mult" type="number" min=".5" max="5" step=".5" value="2">
  </div>
  <div id="g-color-row" class="grow">
    <span class="gl">颜色</span>
    <input type="color" id="g-color" value="#2962ff" style="width:60px;height:24px;border:none;background:none;cursor:pointer;padding:0">
  </div>
  <div id="g-vpvr-opts" style="display:none;flex-direction:column;gap:7px">
    <div class="vrow">行数<input type="range" id="g-vrows" min="10" max="200" value="100" oninput="document.getElementById('g-vrows-v').textContent=this.value"><span class="vv" id="g-vrows-v">100</span></div>
    <div class="vrow">宽度%<input type="range" id="g-vw" min="5" max="45" value="18" oninput="document.getElementById('g-vw-v').textContent=this.value"><span class="vv" id="g-vw-v">18</span></div>
  </div>
  <button class="gbtn" id="gpop-btn" onclick="commitPop()">添加</button>
</div>

<!-- ── PRESET / RESTORE MODAL ── -->
<div id="preset-modal">
  <div class="pm-box">
    <button onclick="closePresetModal()" style="position:absolute;top:10px;right:12px;background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;line-height:1">✕</button>
    <h3 id="pm-title">选择看盘界面</h3>
    <div class="pm-sub" id="pm-sub">检测到网页已更新版本。你可以恢复上次保存的界面，或加载一款默认配置（含 K 线周期与指标周期）。</div>
    <div id="pm-restore-wrap"></div>
    <div class="pm-sec">默认界面</div>
    <button class="pm-btn" onclick="applyPreset('scalp')"><b>短线高频</b><span class="pm-d">1m·3m·5m·15m·30m·1h ｜ EMA 7/25/99/200 ｜ TEMA</span></button>
    <button class="pm-btn" onclick="applyPreset('default')"><b>综合默认</b><span class="pm-d">3m·15m·1h·6h ｜ EMA 25/99/200/288/400/600 ｜ TEMA</span></button>
    <button class="pm-btn" onclick="applyPreset('swing')"><b>中长线</b><span class="pm-d">1h·4h·12h·1d·3d·1w ｜ MA 25/99/200/400 ｜ MA</span></button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════
const SYM='BTCUSDT', REST='https://api.binance.com/api/v3', FAPI='https://fapi.binance.com/fapi/v1';
const BINANCE_TFS=['1s','1m','3m','5m','15m','30m','1h','2h','4h','6h','8h','12h','1d','3d','1w','1M'];
// pool to draw extra panel TFs from (ascending)
const TF_POOL=['1m','3m','5m','15m','30m','1h','2h','4h','6h','8h','12h','1d','3d','1w','1M'];

const APP_VERSION='3';            // bump on each release to offer restore/preset choice
const SETTINGS_KEY='btcll_settings_v1';

function tfToSec(tf){
  const n=parseInt(tf),u=tf.slice(-1);
  if(u==='s')return n;if(u==='m')return n*60;if(u==='h')return n*3600;
  if(u==='d')return n*86400;if(u==='w')return n*604800;if(u==='M')return n*2592000;
  return 0;
}

// Rainbow ramp for the EMA periods (light→prominent: red→orange→yellow→green→cyan→blue)
const EMA_RAMP=[
  {color:'#ef5350',lw:.7, fs:9},
  {color:'#ff9800',lw:1.0,fs:9.5},
  {color:'#f9a825',lw:1.45,fs:10},
  {color:'#4caf50',lw:1.85,fs:10.5},
  {color:'#00bcd4',lw:2.3, fs:11},
  {color:'#2962ff',lw:2.8, fs:11.5},
];
const PALETTE=['#ab47bc','#e91e63','#8bc34a','#00bcd4','#ff9800','#2962ff'];

// ── interface presets (TF order ascending = left→right, top→bottom) ──
const PRESETS={
  scalp:  {name:'短线高频', tfs:['1m','3m','5m','15m','30m','1h'], emas:[7,25,99,200], tema:true, ma:false, vpvr:true},
  default:{name:'综合默认', tfs:['3m','15m','1h','6h'], emas:[25,99,200,288,400,600], tema:true, ma:false, vpvr:true},
  swing:  {name:'中长线',   tfs:['1h','4h','12h','1d','3d','1w'], emas:[25,99,200,400], tema:false, ma:true, vpvr:true},
};

// ══════════════════════════════════════════════
// GLOBAL STATE
// ══════════════════════════════════════════════
let _uid=1; const uid=()=>'i'+(_uid++);
let _pidx=0;
let maToggle={tema:true, ma:false};
let sharedInds=[];
const POP={indId:null,mode:'add'};
const panels=[];
let userTFs=[...BINANCE_TFS];

// ══════════════════════════════════════════════
// SETTINGS PERSISTENCE
// ══════════════════════════════════════════════
function snapshotSettings(){
  return {
    version:APP_VERSION,
    panelTFs:panels.map(p=>p.tf),
    userTFs:[...userTFs],
    maToggle:{...maToggle},
    inds:sharedInds.map(i=>({...i})),
    rowH:rowHManual?rowH:null,
  };
}
function saveSettings(){
  try{localStorage.setItem(SETTINGS_KEY,JSON.stringify(snapshotSettings()));}catch(_){}
}
function loadSavedSettings(){

// ══════════════════════════════════════════════
// MATH
// ══════════════════════════════════════════════
function calcEMA(arr,n){
  const k=2/(n+1),out=new Array(arr.length).fill(null);
  let v=null,c=0;
  for(let i=0;i<arr.length;i++){
    if(arr[i]==null)continue;
    if(v===null){c++;if(c<n){v=(v||0)+arr[i];}else{v=((v||0)+arr[i])/n;out[i]=v;}}
    else{v=arr[i]*k+v*(1-k);out[i]=v;}
  }
  return out;
}
function calcMA(arr,n){
  const out=new Array(arr.length).fill(null);
  for(let i=n-1;i<arr.length;i++){
    let s=0;for(let j=i-n+1;j<=i;j++)s+=arr[j];
    out[i]=s/n;
  }
  return out;
}
function calcTEMA(arr,n){
  const e1=calcEMA(arr,n),e2=calcEMA(e1,n),e3=calcEMA(e2,n);
  return arr.map((_,i)=>e1[i]!=null&&e2[i]!=null&&e3[i]!=null?3*e1[i]-3*e2[i]+e3[i]:null);
}
function calcBB(c,n=20,m=2){
  const mid=[],up=[],lo=[];
  for(let i=0;i<c.length;i++){
    if(i<n-1){mid.push(null);up.push(null);lo.push(null);continue;}
    let s=0,s2=0;for(let j=i-n+1;j<=i;j++){s+=c[j];s2+=c[j]*c[j];}
    const avg=s/n,sd=Math.sqrt(Math.max(0,s2/n-avg*avg));
    mid.push(avg);up.push(avg+m*sd);lo.push(avg-m*sd);
  }
  return{mid,up,lo};
}
function calcVWAP(candles){
  const out=[];let cv=0,ctv=0,day=-1;
  for(const c of candles){
    const d=Math.floor(c.time/86400);
    if(d!==day){day=d;cv=0;ctv=0;}
    const t=(c.high+c.low+c.close)/3;ctv+=t*c.volume;cv+=c.volume;
    out.push(cv>0?ctv/cv:null);
  }
  return out;
}
function hexRgba(hex,op){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return`rgba(${r},${g},${b},${op})`;
}
function autoStyle(p){const t=Math.min(1,Math.log10(p+1)/Math.log10(2001));return{lw:.5+t*2.2,op:.3+t*.7};}
function indLabel(ind){
  if(ind.type==='ma-line')return`${ind.p}`;
  if(ind.type==='bb')return`BB(${ind.p},${ind.m||2})`;
  if(ind.type==='vwap')return'VWAP';
  if(ind.type==='vpvr')return'VPVR';
  return ind.type.toUpperCase();
}

const pk=k=>({time:Math.floor(k[0]/1000),open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5]});
async function fetchCandles(tf){
  const r1=await fetch(`${REST}/klines?symbol=${SYM}&interval=${tf}&limit=1000`);
  const d1=await r1.json();const c1=d1.map(pk);
  try{
    const r2=await fetch(`${REST}/klines?symbol=${SYM}&interval=${tf}&limit=1000&endTime=${d1[0][0]-1}`);
    const d2=await r2.json();return[...d2.map(pk),...c1];
  }catch(_){return c1;}
}

// ══════════════════════════════════════════════
// VPVR — offset from right price axis
// ══════════════════════════════════════════════
function drawVPVR(pi){
  const p=panels[pi];
  const canvas=p.vpvrCanvas;
  if(!canvas||!p.chart||!p.candles?.length)return;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const vi=sharedInds.find(i=>i.type==='vpvr');
  if(!vi||vi.hidden)return;
  const lr=p.chart.timeScale().getVisibleLogicalRange();
  if(!lr)return;
  const from=Math.max(0,Math.floor(lr.from)),to=Math.min(p.candles.length-1,Math.ceil(lr.to));
  const vis=p.candles.slice(from,to+1);if(vis.length<2)return;
  const rows=vi.rows||100,wpct=vi.width||18;
  const minP=Math.min(...vis.map(c=>c.low)),maxP=Math.max(...vis.map(c=>c.high));
  const rng=maxP-minP;if(rng===0)return;
  const rs=rng/rows,vols=new Array(rows).fill(0);
  for(const c of vis){
    const r0=Math.max(0,Math.floor((c.low-minP)/rs)),r1=Math.min(rows-1,Math.floor((c.high-minP)/rs));
    const cnt=r1-r0+1;for(let r=r0;r<=r1;r++)vols[r]+=c.volume/cnt;
  }
  const maxV=Math.max(...vols);
  const HIGHLIGHT_N=3;
  const lowRows=new Set(
    vols.map((v,r)=>({v,r})).filter(o=>o.v>0).sort((a,b)=>a.v-b.v).slice(0,HIGHLIGHT_N).map(o=>o.r)
  );
  const axisW=(p.chart.priceScale('right').width&&p.chart.priceScale('right').width())||65;
  const W=canvas.width;
  const barMaxW=(W-axisW)*wpct/100;
  const rightEdge=W-axisW;
  for(let r=0;r<rows;r++){
    if(vols[r]===0)continue;
    const yBot=p.candleSeries.priceToCoordinate(minP+r*rs);
    const yTop=p.candleSeries.priceToCoordinate(minP+(r+1)*rs);
    if(yBot==null||yTop==null)continue;
    const y=Math.min(yBot,yTop),bH=Math.max(1,Math.abs(yBot-yTop)-1);
    const bW=vols[r]/maxV*barMaxW;
    ctx.fillStyle=lowRows.has(r)?'rgba(239,83,80,.6)':'rgba(41,98,255,.2)';
    ctx.fillRect(rightEdge-bW,y,bW,bH);
  }
}
function schedVPVR(pi){
  const p=panels[pi];if(!p)return;
  if(p._vraf)cancelAnimationFrame(p._vraf);
  p._vraf=requestAnimationFrame(()=>drawVPVR(pi));
}

function nextPoolTF(){
  // pick the smallest pool TF not yet used, keeping ascending feel
  const used=new Set(panels.map(p=>p.tf));
  for(const tf of TF_POOL){if(!used.has(tf))return tf;}
  return '1h';
}
function addRow(){
  if(panels.length>=12)return;
  const grid=document.getElementById('grid');
  for(let i=0;i<2&&panels.length<12;i++){
    const pi=panels.length;
    const tf=nextPoolTF();
    if(!userTFs.includes(tf))userTFs.push(tf);
    panels.push({tf,candles:[],seriesMap:{},chart:null,ws:null,vpvrCanvas:null,_vraf:null,logMode:false,invMode:false});

    pnlDiv.className='pnl';pnlDiv.id=`pnl-${pi}`;
    grid.appendChild(pnlDiv);
    buildDOM(pi);
    loadPanel(pi);
  }
  refreshMinimap();saveSettings();

function removeRow(){
  if(panels.length<=2)return;
  const toRemove=Math.min(2,panels.length-2);
  for(let i=0;i<toRemove;i++){
    const pi=panels.length-1;
    const p=panels[pi];
    if(p.ws){try{p.ws.close();}catch(_){}}
    if(p._vraf)cancelAnimationFrame(p._vraf);
    if(p.chart){try{p.chart.remove();}catch(_){}}
    document.getElementById(`pnl-${pi}`)?.remove();
    panels.pop();
  }
  refreshMinimap();saveSettings();
}

async function loadPanel(pi){
  const p=panels[pi];
  const cw=document.getElementById(`cw-${pi}`);
  if(!cw)return;
  if(p.chart){try{p.chart.remove();}catch(_){}p.chart=null;}
  if(p.ws){try{p.ws.close();}catch(_){}p.ws=null;}
  if(p._vraf){cancelAnimationFrame(p._vraf);p._vraf=null;}
  p.noMore=false;
  cw.innerHTML=`<div class="ldg" id="ldg-${pi}"><div class="sp"></div>加载中...</div>`;
  try{
    const candles=await fetchCandles(p.tf);p.candles=candles;
    const W=cw.clientWidth||800,H=cw.clientHeight||394;
    const mainDiv=document.createElement('div');mainDiv.style.cssText=`position:absolute;left:0;right:0;top:0;height:${H}px;`;cw.appendChild(mainDiv);
    const vc=document.createElement('canvas');vc.style.cssText='position:absolute;left:0;top:0;pointer-events:none;z-index:8;';vc.width=W;vc.height=H;cw.appendChild(vc);p.vpvrCanvas=vc;
    p.chart=LightweightCharts.createChart(mainDiv,{
      width:W,height:H,
      layout:{background:{type:'Solid',color:'#131722'},textColor:'#787b86'},
      grid:{vertLines:{color:'#1c2030'},horzLines:{color:'#1c2030'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      rightPriceScale:{borderColor:'#363c4e',scaleMargins:{top:.05,bottom:.04},mode:p.logMode?1:0,invertScale:!!p.invMode},
      timeScale:{borderColor:'#363c4e',timeVisible:true,secondsVisible:false,rightOffset:12,barSpacing:5,minBarSpacing:2},
      handleScroll:true,handleScale:true,
    });
    p.candleSeries=p.chart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});
    p.candleSeries.setData(candles);
    // show recent candles big enough to read OHLC shapes, with a right gap
    // so the latest bar clears the price axis + VPVR
    {
      const ts=p.chart.timeScale();
      const visN=Math.max(80,Math.min(candles.length,Math.round((cw.clientWidth||800)/5)));
      const last=candles.length-1;
      ts.setVisibleLogicalRange({from:last-visN,to:last+12});
    }
    p.chart.timeScale().subscribeVisibleLogicalRangeChange(range=>{
      schedVPVR(pi);

  }

// ══════════════════════════════════════════════
// DRAW ALL INDICATORS
// ══════════════════════════════════════════════
function toLD(arr,times){return arr.map((v,i)=>v!=null?{time:times[i],value:v}:null).filter(Boolean);}

function drawAllInds(pi){
  const p=panels[pi];
  if(!p.chart||!p.candles)return;
  const candles=p.candles,closes=candles.map(c=>c.close),times=candles.map(c=>c.time);
  for(const s of Object.values(p.seriesMap||{})){try{p.chart.removeSeries(s);}catch(_){}}
  p.seriesMap={};
  for(const ind of sharedInds){
    if(ind.type==='vpvr')continue;
    const lw=ind.lw||(ind.p?autoStyle(ind.p).lw:1.5);
    const col=ind.color;
    const vis=!ind.hidden;
    const ln=(c=col,w=lw,style=0)=>p.chart.addLineSeries({color:c,lineWidth:w,lineStyle:style,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,visible:vis});
    if(ind.type==='ma-line'){
      if(maToggle.tema){const s=ln(col,lw,0);s.setData(toLD(calcTEMA(closes,ind.p),times));p.seriesMap[ind.id+'_tema']=s;}
      if(maToggle.ma){const s=ln(col,lw,2);s.setData(toLD(calcMA(closes,ind.p),times));p.seriesMap[ind.id+'_ma']=s;}
    }else if(ind.type==='bb'){
      const b=calcBB(closes,ind.p,ind.m||2);
      const sm=ln(col,lw),su=ln(hexRgba(col,.5),Math.max(.5,lw-.4)),sl=ln(hexRgba(col,.5),Math.max(.5,lw-.4));
      sm.setData(toLD(b.mid,times));su.setData(toLD(b.up,times));sl.setData(toLD(b.lo,times));
      p.seriesMap[ind.id+'m']=sm;p.seriesMap[ind.id+'u']=su;p.seriesMap[ind.id+'l']=sl;
    }else if(ind.type==='vwap'){
      const s=ln(col,1.8);s.setData(toLD(calcVWAP(candles),times));p.seriesMap[ind.id]=s;
    }
  }
  schedVPVR(pi);
}

function redrawAllPanels(){panels.forEach((_,i)=>drawAllInds(i));}

// ══════════════════════════════════════════════
// INFINITE HISTORY
// ══════════════════════════════════════════════
async function loadMoreHistory(pi){
  const p=panels[pi];
  if(p.loadingMore||p.noMore||!p.candles?.length)return;
  p.loadingMore=true;
  try{
    const oldest=p.candles[0];
    const endTime=oldest.time*1000-1;
    const r=await fetch(`${REST}/klines?symbol=${SYM}&interval=${p.tf}&limit=1000&endTime=${endTime}`);
    const raw=await r.json();
    if(!raw.length){p.noMore=true;return;}
    const older=raw.map(pk).filter(c=>c.time<oldest.time);
    if(!older.length){p.noMore=true;return;}
    const ts=p.chart.timeScale();
    const before=ts.getVisibleLogicalRange();
    const added=older.length;
    p.candles=[...older,...p.candles];
    p.candleSeries.setData(p.candles);
    drawAllInds(pi);
    if(before)ts.setVisibleLogicalRange({from:before.from+added,to:before.to+added});
  }catch(_){}finally{p.loadingMore=false;}
}

// WEBSOCKET
// ══════════════════════════════════════════════
function subKline(pi){
  const p=panels[pi];let retry=1000;
  const url=`wss://stream.binance.com:9443/ws/btcusdt@kline_${p.tf}`;
  function conn(){
    const ws=new WebSocket(url);p.ws=ws;
    ws.onmessage=evt=>{
      try{
        const k=JSON.parse(evt.data).k;if(!k)return;
        const c={time:Math.floor(k.t/1000),open:+k.o,high:+k.h,low:+k.l,close:+k.c,volume:+k.v};
        const last=p.candles[p.candles.length-1];
        if(last&&last.time===c.time)p.candles[p.candles.length-1]=c;
        else if(!last||c.time>last.time)p.candles.push(c);
        if(p.candleSeries)p.candleSeries.update(c);
        if(k.x)drawAllInds(pi);
        updatePP(pi);schedVPVR(pi);retry=1000;
      }catch(_){}
    };
    ws.onclose=()=>setTimeout(conn,retry=Math.min(retry*2,16000));
    ws.onerror=()=>ws.close();
  }
  conn();
}
function startTicker(){
  let retry=1000;
  function conn(){
    const ws=new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@miniTicker');
    ws.onmessage=evt=>{
      try{
        const d=JSON.parse(evt.data);const price=+d.c,chg=(price-+d.o)/+d.o*100;
        document.getElementById('lp').textContent=fmt(price);
        document.getElementById('lp').className=chg>=0?'up':'dn';
        const ce=document.getElementById('pc');ce.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';ce.className=chg>=0?'up':'dn';
        document.getElementById('shi').textContent=fmt(+d.h);
        document.getElementById('slo').textContent=fmt(+d.l);
        document.getElementById('svol').textContent=fmtV(+d.v);
        retry=1000;
      }catch(_){}
    };
    ws.onclose=()=>setTimeout(conn,retry=Math.min(retry*2,16000));
    ws.onerror=()=>ws.close();
  }
  conn();
}

function refreshMinimap(){
  const sw=document.getElementById('scroll-wrap');
  const grid=document.getElementById('grid');
  const mm=document.getElementById('minimap');
  const track=document.getElementById('mm-track');
  if(!sw||!grid||!mm||!track)return;

// minimap drag / click → scroll the chart area
(function(){
  const mm=document.getElementById('minimap');
  const sw=document.getElementById('scroll-wrap');
  const grid=document.getElementById('grid');
  let dragging=false;
  function scrollToClientY(clientY){
    const rect=mm.getBoundingClientRect();
    const contentH=grid.scrollHeight||1;
    const scale=mm.clientHeight/contentH;
    let y=clientY-rect.top;
    let target=y/scale - sw.clientHeight/2;
    target=Math.max(0,Math.min(contentH-sw.clientHeight,target));
    sw.scrollTop=target;
  }
  mm.addEventListener('mousedown',e=>{dragging=true;scrollToClientY(e.clientY);e.preventDefault();});
  document.addEventListener('mousemove',e=>{if(dragging)scrollToClientY(e.clientY);});
  document.addEventListener('mouseup',()=>{dragging=false;});
  mm.addEventListener('wheel',e=>{sw.scrollTop+=e.deltaY;e.preventDefault();},{passive:false});
  sw.addEventListener('scroll',updateMinimapThumb);
})();

// page wheel only navigates via minimap/scrollbar — wheel over charts stays zoom-only
(function(){
  const sw=document.getElementById('scroll-wrap');
  sw.addEventListener('wheel',e=>{e.preventDefault();},{passive:false});
})();

// ── uniform row-height management ──
// default: 2 rows (4 panels) exactly fill the visible chart area
let rowH=420, rowHManual=false;
function applyRowH(h){
  rowH=Math.round(h);
  document.documentElement.style.setProperty('--row-h',rowH+'px');
  resizeAll();
}
function defaultRowH(){
  const sw=document.getElementById('scroll-wrap');
  const h=sw?sw.clientHeight:840;
  return Math.max(160,Math.floor((h-1)/2)); // 2 rows fill viewport (gap 1px)
}
function setDefaultRowH(){applyRowH(defaultRowH());}

// drag the horizontal divider between rows to resize ALL panels uniformly
(function(){
  const grid=document.getElementById('grid');
  const GAP=1, THRESH=6;
  let dragging=false, boundaryK=0, raf=null;
  function boundaryAt(clientY){
    const top=grid.getBoundingClientRect().top;
    const y=clientY-top;
    if(y<=0)return 0;
    const k=Math.round(y/(rowH+GAP));
    if(k>=1 && Math.abs(y-k*(rowH+GAP))<THRESH) return k;
    return 0;
  }
  grid.addEventListener('mousemove',e=>{
    if(dragging)return;
    grid.style.cursor=boundaryAt(e.clientY)?'row-resize':'';
  });
  grid.addEventListener('mousedown',e=>{
    const k=boundaryAt(e.clientY);
    if(!k)return;
    dragging=true;boundaryK=k;
    grid.classList.add('row-resizing');
    e.preventDefault();e.stopPropagation();
  },true);
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const top=grid.getBoundingClientRect().top;
    const y=e.clientY-top;
    const h=Math.max(160,Math.min(1200, y/boundaryK - GAP));
    rowHManual=true;
    if(raf)cancelAnimationFrame(raf);
    raf=requestAnimationFrame(()=>applyRowH(h));
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;
    dragging=false;grid.classList.remove('row-resizing');grid.style.cursor='';
    refreshMinimap();saveSettings();
  });
})();

window.addEventListener('resize',()=>{if(!rowHManual)setDefaultRowH();});

// left column width resize
(function(){
  const col=document.getElementById('left-col');
  const handle=document.getElementById('left-handle');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{dragging=true;startX=e.clientX;startW=col.offsetWidth;e.preventDefault();});
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const w=Math.max(150,Math.min(480,startW+(e.clientX-startX)));
    col.style.width=w+'px';
  });
  document.addEventListener('mouseup',()=>{if(dragging){dragging=false;resizeAll();}});
})();

// ══════════════════════════════════════════════
// FORMAT
// ══════════════════════════════════════════════
function fmt(v){return v>=10000?v.toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0}):v.toFixed(2);}
function fmtV(v){if(v>=1e9)return(v/1e9).toFixed(2)+'B';if(v>=1e6)return(v/1e6).toFixed(2)+'M';if(v>=1e3)return(v/1e3).toFixed(1)+'K';return v.toFixed(0);}

// ══════════════════════════════════════════════
// CHAT
// ══════════════════════════════════════════════
// Primary: EMQX public broker (reliable TLS websocket)
// Fallback: HiveMQ
const MQTT_BROKERS=[
  'wss://broker.emqx.io:8084/mqtt',
  'wss://broker.hivemq.com:8000/mqtt',
];
const MQTT_TOPIC='btcll-chat-v1';
const CHAT_KEY='btcll_chat_msgs_v1';
let mqttClient=null;
let mqttBrokerIdx=0;

function getNick(){
  let nick=localStorage.getItem('btcll_nick');
  if(!nick){
    const tz=Intl.DateTimeFormat().resolvedOptions().timeZone||'UTC';
    const city=tz.split('/').pop().replace(/_/g,'').substring(0,3).toUpperCase();
    nick=city+String(Math.floor(1000+Math.random()*9000));
    localStorage.setItem('btcll_nick',nick);
  }
  return nick;
}
function getChatMsgs(){try{return JSON.parse(localStorage.getItem(CHAT_KEY)||'[]');}catch(_){return[];}}
function saveChatMsg(msg){
  const msgs=getChatMsgs();
  if(msgs.find(m=>m.ts===msg.ts&&m.nick===msg.nick))return false;
  msgs.push(msg);
  if(msgs.length>1000)msgs.splice(0,msgs.length-1000);
  localStorage.setItem(CHAT_KEY,JSON.stringify(msgs));
  return true;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function renderChatMsgs(){
  const msgs=getChatMsgs();
  const el=document.getElementById('chat-msgs');if(!el)return;
  const atBottom=el.scrollHeight-el.scrollTop-el.clientHeight<40;
  el.innerHTML=msgs.map(m=>{
    const d=new Date(m.ts);
    const t=d.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
    return`<div class="cm"><div class="cm-top"><span class="cn">${escHtml(m.nick)}</span><span class="ct">${t}</span></div><span class="cb">${escHtml(m.text)}</span></div>`;
  }).join('');
  if(atBottom||msgs.length<=20)el.scrollTop=el.scrollHeight;
}

function setChatStatus(connected,label){
  const s=document.getElementById('chat-status');
  if(!s)return;
  s.textContent=connected?'●':'○';
  s.style.color=connected?'var(--green)':'var(--text2)';
  s.title=label||'';
}

function sendChat(){
  const inp=document.getElementById('chat-inp');
  const text=inp.value.trim();if(!text)return;
  if(!mqttClient||!mqttClient.connected){
    // show brief error in status
    setChatStatus(false,'未连接，消息未发出');
    return;
  }
  const msg={nick:getNick(),text,ts:Date.now()};
  inp.value='';
  // Publish only — the broker echoes it back to us via the subscription,
  // which is when we save+render. This ensures sender and recipients
  // both go through the same single code path.
  try{mqttClient.publish(MQTT_TOPIC,JSON.stringify(msg),{qos:1});}catch(e){
    // fallback: save locally if publish fails
    saveChatMsg(msg);renderChatMsgs();
  }
}

function connectMQTT(brokerUrl){
  if(mqttClient){try{mqttClient.end(true);}catch(_){}}
  setChatStatus(false,'连接中…');
  const client=mqtt.connect(brokerUrl,{
    clientId:'btcll_'+Math.random().toString(36).slice(2,10),
    reconnectPeriod:0,     // we handle reconnect manually to rotate brokers
    connectTimeout:10000,
    keepalive:30,
    clean:true,
  });
  mqttClient=client;
  let connected=false;

  client.on('connect',()=>{
    connected=true;
    client.subscribe(MQTT_TOPIC,{qos:1});
    setChatStatus(true,brokerUrl);
  });

  client.on('message',(_t,payload)=>{
    try{
      const msg=JSON.parse(payload.toString());
      if(saveChatMsg(msg))renderChatMsgs();
    }catch(_){}
  });

  // rotate broker on failure
  const tryNext=()=>{
    if(client!==mqttClient)return; // superseded
    mqttBrokerIdx=(mqttBrokerIdx+1)%MQTT_BROKERS.length;
    setChatStatus(false,'切换服务器…');
    setTimeout(()=>connectMQTT(MQTT_BROKERS[mqttBrokerIdx]),2000);
  };
  client.on('error',()=>{if(!connected)tryNext();});
  client.on('close',()=>{
    setChatStatus(false,'已断开');
    setTimeout(tryNext,3000);
  });
}

function initChat(){
  document.getElementById('chat-nick-lbl').textContent=getNick();
  renderChatMsgs();
  try{connectMQTT(MQTT_BROKERS[0]);}catch(e){console.warn('MQTT init failed',e);}
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
function bootCommon(){
  new ResizeObserver(resizeAll).observe(document.getElementById('scroll-wrap'));
  startTicker();fetchFR();fetchOI();
  setInterval(()=>{fetchFR();fetchOI();},30000);
  setInterval(()=>panels.forEach((_,i)=>schedVPVR(i)),600);
  initChat();
}

function init(){
  const saved=loadSavedSettings();
  if(saved&&saved.version!==APP_VERSION){
    // new version → let user choose restore or a default preset
    syncMaBtns();
    openPresetModal(saved);
  }else if(saved&&saved.panelTFs&&saved.panelTFs.length){
    // same version → silently restore
    applySettings(saved);
  }else{
    // first run → default preset
    applyPreset('default');
  }
  bootCommon();
}
init();
